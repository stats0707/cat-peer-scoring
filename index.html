  <section class="step with-ears" id="step1">
    <div class="step-title">
      <span class="paw-icon">🐾</span> 第1步：选择你所在的小组
    </div>
    <div class="group-selector">
      <div class="select-wrapper">
        <select id="groupSelect">
          <option value="">-- 请选择你的小组 --</option>
        </select>
      </div>
      <div class="selected-info" id="selectedInfo">
        <h3>👥 组员名单</h3>
        <div class="members-list" id="membersList"></div>
        <div class="progress-bar-wrap">
          <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
          <span class="progress-text" id="progressText">0/11 组已评</span>
        </div>
      </div>
    </div>
  </section>

  <!-- ====== 第2步：评分卡片区 ====== -->
  <section class="step with-ears" id="step2" style="display:none;">
    <div class="step-title">
      <span class="paw-icon">🐱</span> 第2步：对其他小组逐一评分
      <span style="font-size:0.75em;font-weight:normal;color:var(--cat-brown);margin-left:10px;">
        （拖动滑块 1-10分）
      </span>
    </div>
    <div class="score-cards" id="scoreCards"></div>
    <div class="submit-all-section" id="submitAllSection" style="display:none;">
      <button class="submit-all-btn" onclick="submitAllScores()">
        🐾 一键提交全部评分 <span id="submitAllCount"></span>
      </button>
    </div>
  </section>

  <!-- ====== 评分结果看板 ====== -->
  <section class="step with-ears" id="step3">
    <div class="step-title">
      <span class="paw-icon">🏆</span> 评分结果看板（实时更新）
    </div>
    <div class="results-table-wrap">
      <table class="results-table" id="resultsTable">
        <thead>
          <tr>
            <th>排名</th>
            <th>组号</th>
            <th>小组成员</th>
            <th>总均分</th>
            <th>背景介绍</th>
            <th>数据说明</th>
            <th>描述性分析</th>
            <th>建模分析</th>
            <th>商业化应用</th>
            <th>报告格式</th>
            <th>评分数</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          <tr><td colspan="11"><div class="no-data"><span class="cat-sleep">😺💤</span>还没有评分数据，等待第一份评分到来~</div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="last-update" id="lastUpdate"></div>
  </section>

  <!-- ====== 页脚 ====== -->
  <footer class="footer">
    <div class="paw-trail">🐾 🐾 🐾 🐾 🐾</div>
    <p>喵~ 每个小组请认真对待每一次评分 🐱</p>
  </footer>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 猫咪互评系统 - 前端 JavaScript
// ============================================================

const DIMENSIONS = ['背景介绍', '数据说明', '数据描述性分析', '数据建模分析', '商业化应用', '报告格式与展示'];

// 12个小组（硬编码，不依赖 Supabase 加载）
const ALL_GROUPS = [
  {id:1, members:['宋泽','魏海洋','孔文兴','李祥斌']},
  {id:2, members:['刘能浩','李向川','曹迎春']},
  {id:3, members:['彭翔栩','李文武','施润','王嵘俊']},
  {id:4, members:['邵明雨','朱俊莹','苏国']},
  {id:5, members:['朱楠','龙文静','朱明芬']},
  {id:6, members:['罗雯霄','李娜','张鑫雨','胡俊仪']},
  {id:7, members:['蔡奇仙','李美婷','胡兴蕊']},
  {id:8, members:['马跃芸','王永利','钱思怡']},
  {id:9, members:['代长美','罗微','赵国慧']},
  {id:10, members:['曹希萌','马富容','崔冬月']},
  {id:11, members:['陈玉曼','金淑靖']},
  {id:12, members:['李韩']}
];

let AppState = {
  currentGroup: null,
  allGroups: [],
  myScores: {},
  results: [],
  sseConnected: false,
  channel: null
};

// DOM refs
const $ = (sel) => document.querySelector(sel);
const groupSelect = $('#groupSelect');
const selectedInfo = $('#selectedInfo');
const membersList = $('#membersList');
const progressFill = $('#progressFill');
const progressText = $('#progressText');
const step2 = $('#step2');
const scoreCards = $('#scoreCards');
const submitAllSection = $('#submitAllSection');
const submitAllCount = $('#submitAllCount');
const resultsBody = $('#resultsBody');
const lastUpdate = $('#lastUpdate');
const connDot = $('#connDot');
const connText = $('#connText');
const toast = $('#toast');

// ============================================================
// 初始化
// ============================================================
async function init() {
  subscribeRealtime();
  try { await loadGroups(); } catch(e) { console.error('loadGroups error:', e); }
  try { await loadResults(); } catch(e) { console.error('loadResults error:', e); }
}

async function loadGroups() {
  AppState.allGroups = ALL_GROUPS;

  // 直接填充下拉框
  let html = '<option value="">-- 请选择你的小组 --</option>';
  ALL_GROUPS.forEach(g => {
    html += `<option value="${g.id}">第${g.id}组：${g.members.join('、')}</option>`;
  });
  groupSelect.innerHTML = html;

  // 后台异步加载评分进度（非阻塞）
  try {
    const { data: scores } = await supabase.from('scores').select('rater_group');
    const countMap = {};
    (scores || []).forEach(s => { countMap[s.rater_group] = (countMap[s.rater_group] || 0) + 1; });
    if (AppState.currentGroup) {
      const scored = countMap[AppState.currentGroup] || 0;
      const total = ALL_GROUPS.length - 1;
      progressFill.style.width = (scored / total * 100) + '%';
      progressText.textContent = `${scored}/${total} 组已评`;
    }
  } catch(e) { /* 非关键 */ }
}

// ============================================================
// 小组选择处理
// ============================================================
groupSelect.addEventListener('change', async function() {
  const gid = parseInt(this.value);
  if (!gid) {
    AppState.currentGroup = null;
    selectedInfo.classList.remove('visible');
    step2.style.display = 'none';
    return;
  }

  AppState.currentGroup = gid;
  const group = AppState.allGroups.find(g => g.id === gid);
  if (!group) { showToast('小组数据异常，请刷新页面 🐱', true); return; }

  // 显示选中组信息
  membersList.textContent = group.members.join('、');
  selectedInfo.classList.add('visible');

  // 加载该组的评分记录
  await loadMyScores(gid);

  // 更新进度
  const scored = Object.keys(AppState.myScores).length;
  progressFill.style.width =   (scored / (AppState.allGroups.length - 1 || 11) * 100) + '%';
  progressText.textContent = `${scored}/${AppState.allGroups.length - 1 || 11} 组已评`;

  // 显示评分区
  step2.style.display = 'block';
  renderScoreCards(gid);
});

async function loadMyScores(gid) {
  try {
    const { data, error } = await supabase
      .from('scores')
      .select('*')
      .eq('rater_group', gid);
    if (error) { console.error('加载评分记录失败', error); return; }
    AppState.myScores = {};
    (data || []).forEach(s => {
      AppState.myScores[s.rated_group] = s;
    });

    // 更新进度
    const scored = Object.keys(AppState.myScores).length;
    progressFill.style.width =   (scored / (AppState.allGroups.length - 1 || 11) * 100) + '%';
    progressText.textContent = `${scored}/${AppState.allGroups.length - 1 || 11} 组已评`;
  } catch (e) {
    console.error('加载评分记录失败', e);
  }
}

// ============================================================
// 渲染评分卡片
// ============================================================
function renderScoreCards(myGid) {
  const otherGroups = AppState.allGroups.filter(g => g.id !== myGid);
  let totalUnsubmitted = 0;

  scoreCards.innerHTML = otherGroups.map(g => {
    const existing = AppState.myScores[g.id];
    const completed = !!existing;
    if (!completed) totalUnsubmitted++;

    return `
    <div class="score-card ${completed ? 'completed' : ''}" data-group="${g.id}" id="card-${g.id}">
      <div class="card-header">
        <div class="group-badge">${g.id}</div>
        <div>
          <div class="group-name">第${g.id}组</div>
          <div class="group-members">${g.members.join('、')}</div>
        </div>
      </div>
      ${DIMENSIONS.map((dim, i) => `
      <div class="dimension-row">
        <label class="dimension-label">${dim}</label>
        <div class="dimension-input">
          <input type="range" min="1" max="10" value="${existing ? existing.scores[dim] : 5}"
                 data-group="${g.id}" data-dim="${dim}"
                 oninput="updateSlider(this)" onchange="onSliderChange(${g.id})">
        </div>
        <span class="score-value" id="val-${g.id}-${i}">${existing ? existing.scores[dim] : 5}</span>
      </div>
      `).join('')}
      <div class="card-footer">
        <div class="card-total">
          总分：<strong id="total-${g.id}">${existing ? existing.total : 30}</strong> / 60
        </div>
        <button class="paw-btn ${completed ? 'completed-btn' : ''}" onclick="submitScore(${g.id})">
          ${completed ? '🐟 修改' : '🐾 喵~提交'}
        </button>
      </div>
    </div>`;
  }).join('');

  // 显示一键提交按钮
  if (totalUnsubmitted > 0) {
    submitAllSection.style.display = 'block';
    submitAllCount.textContent = `（${totalUnsubmitted}组待提交）`;
  } else {
    submitAllSection.style.display = 'block';
    submitAllCount.textContent = '（全部已提交 ✅）';
  }
}

function updateSlider(input) {
  const gid = input.dataset.group;
  const dim = input.dataset.dim;
  const dimIdx = DIMENSIONS.indexOf(dim);
  const valEl = document.getElementById(`val-${gid}-${dimIdx}`);
  if (valEl) valEl.textContent = input.value;

  // 更新总分
  updateCardTotal(gid);
}

function updateCardTotal(gid) {
  const card = document.getElementById(`card-${gid}`);
  if (!card) return;
  let total = 0;
  card.querySelectorAll('input[type="range"]').forEach(inp => {
    total += parseInt(inp.value);
  });
  const totalEl = document.getElementById(`total-${gid}`);
  if (totalEl) totalEl.textContent = total;
}

function onSliderChange(gid) {
  // 当用户拖动滑块后，更新总分
  updateCardTotal(gid);
}

// ============================================================
// 提交单个评分
// ============================================================
async function submitScore(ratedGid) {
  if (!AppState.currentGroup) {
    showToast('请先选择你的小组 🐱', true);
    return;
  }

  const card = document.getElementById(`card-${ratedGid}`);
  if (!card) return;

  const scores = {};
  card.querySelectorAll('input[type="range"]').forEach(inp => {
    scores[inp.dataset.dim] = parseInt(inp.value);
  });

  try {
    const { data, error } = await supabase.rpc('upsert_score', {
      p_rater_group: AppState.currentGroup,
      p_rated_group: ratedGid,
      p_scores: scores
    });

    if (error || !data || !data.success) {
      showToast(data?.error || '提交失败 😿', true);
      return;
    }

    // 标记卡片为已完成
    card.classList.add('completed');
    const btn = card.querySelector('.paw-btn');
    btn.classList.add('completed-btn');
    btn.textContent = '🐟 修改';
    card.querySelector('.card-total strong').textContent = data.total;

    // 更新本地状态
    AppState.myScores[ratedGid] = {
      rater_group: AppState.currentGroup,
      rated_group: ratedGid,
      scores: scores,
      total: data.total
    };

    // 更新进度
    const scored = Object.keys(AppState.myScores).length;
    progressFill.style.width =   (scored / (AppState.allGroups.length - 1 || 11) * 100) + '%';
    progressText.textContent = `${scored}/${AppState.allGroups.length - 1 || 11} 组已评`;

    // 更新一键提交按钮
    updateSubmitAllBtn();

    // 显示成功动画
    spawnFishParticles(card);
    showToast(`喵~ 第${ratedGid}组评分已保存！🐟`);
  } catch (e) {
    showToast('网络错误，请稍后重试 😿', true);
  }
}

// ============================================================
// 一键提交全部
// ============================================================
async function submitAllScores() {
  if (!AppState.currentGroup) {
    showToast('请先选择你的小组 🐱', true);
    return;
  }

  const myGid = AppState.currentGroup;
  const otherGroups = AppState.allGroups.filter(g => g.id !== myGid);
  const pending = otherGroups.filter(g => !AppState.myScores[g.id]);

  if (pending.length === 0) {
    showToast('所有评分已提交完毕~ 🐱');
    return;
  }

  const btn = document.querySelector('.submit-all-btn');
  const origText = btn.innerHTML;
  btn.innerHTML = '⏳ 提交中...';
  btn.disabled = true;

  let successCount = 0;
  let failCount = 0;

  for (const g of pending) {
    const card = document.getElementById(`card-${g.id}`);
    if (!card) continue;

    const scores = {};
    card.querySelectorAll('input[type="range"]').forEach(inp => {
      scores[inp.dataset.dim] = parseInt(inp.value);
    });

    try {
      const { data, error } = await supabase.rpc('upsert_score', {
        p_rater_group: myGid,
        p_rated_group: g.id,
        p_scores: scores
      });
      if (!error && data && data.success) {
        successCount++;
        card.classList.add('completed');
        const cbtn = card.querySelector('.paw-btn');
        cbtn.classList.add('completed-btn');
        cbtn.textContent = '🐟 修改';
        card.querySelector('.card-total strong').textContent = data.total;
        AppState.myScores[g.id] = { rater_group: myGid, rated_group: g.id, scores, total: data.total };
      } else {
        failCount++;
      }
    } catch (e) {
      failCount++;
    }
  }

  btn.innerHTML = origText;
  btn.disabled = false;

  // 更新进度
  const scored = Object.keys(AppState.myScores).length;
  progressFill.style.width =   (scored / (AppState.allGroups.length - 1 || 11) * 100) + '%';
  progressText.textContent = `${scored}/${AppState.allGroups.length - 1 || 11} 组已评`;
  updateSubmitAllBtn();

  if (failCount === 0) {
    showToast(`喵~ 全部${successCount}组评分提交成功！🎉🐟`);
  } else {
    showToast(`${successCount}组成功，${failCount}组失败 😿`, true);
  }
}

function updateSubmitAllBtn() {
  const myGid = AppState.currentGroup;
  if (!myGid) return;
  const otherGroups = AppState.allGroups.filter(g => g.id !== myGid);
  const pending = otherGroups.filter(g => !AppState.myScores[g.id]);
  const el = document.getElementById('submitAllCount');
  if (!el) return;
  if (pending.length === 0) {
    el.textContent = '（全部已提交 ✅）';
  } else {
    el.textContent = `（${pending.length}组待提交）`;
  }
}

// ============================================================
// 加载结果排名
// ============================================================
async function loadResults() {
  try {
    const { data, error } = await supabase
      .from('group_results')
      .select('*');
    if (error) { console.error('加载排名失败', error); return; }
    AppState.results = data || [];
    renderResults();
  } catch (e) {
    console.error('加载排名失败', e);
  }
}

function renderResults() {
  const results = AppState.results;

  if (!results || results.length === 0 || results.every(r => r.score_count === 0)) {
    resultsBody.innerHTML = '<tr><td colspan="11"><div class="no-data"><span class="cat-sleep">😺💤</span>还没有评分数据，等待第一份评分到来~</div></td></tr>';
    return;
  }

  const myGid = AppState.currentGroup;

  resultsBody.innerHTML = results.map(r => {
    const rankClass = r.rank === 1 ? 'rank-1' : r.rank === 2 ? 'rank-2' : r.rank === 3 ? 'rank-3' : 'rank-other';
    const highlightClass = myGid && r.group_id === myGid ? 'highlight' : '';
    const topClass = r.rank === 1 ? 'top-1' : '';

    return `
    <tr class="${highlightClass} ${topClass}">
      <td><span class="rank-badge ${rankClass}">${r.rank || '-'}</span></td>
      <td><strong>第${r.group_id}组</strong></td>
      <td style="text-align:left;padding-left:12px;">${r.members}</td>
      <td><strong style="color:var(--cat-orange-dark);font-size:1.1em;">${r.avg_total || '-'}</strong></td>
      <td>${r.avg_背景介绍 || '-'}</td>
      <td>${r.avg_数据说明 || '-'}</td>
      <td>${r.avg_数据描述性分析 || '-'}</td>
      <td>${r.avg_数据建模分析 || '-'}</td>
      <td>${r.avg_商业化应用 || '-'}</td>
      <td>${r.avg_报告格式与展示 || '-'}</td>
      <td>${r.score_count}/11</td>
    </tr>`;
  }).join('');

  // 更新时间
  const now = new Date();
  lastUpdate.textContent = `最后更新：${now.toLocaleString('zh-CN')}  🐱 Meow~`;
}

// ============================================================
// Supabase Realtime 订阅（替代原 SSE）
// ============================================================
function subscribeRealtime() {
  if (AppState.channel) {
    supabase.removeChannel(AppState.channel);
  }

  const channel = supabase
    .channel('scores-realtime')
    .on(
      'postgres_changes',
      { event: '*', schema: 'public', table: 'scores' },
      async (payload) => {
        console.log('评分变更:', payload);
        await loadResults();
        if (AppState.currentGroup &&
            payload.new &&
            payload.new.rater_group === AppState.currentGroup) {
          await loadMyScores(AppState.currentGroup);
        }
      }
    )
    .subscribe((status) => {
      AppState.sseConnected = (status === 'SUBSCRIBED');
      updateConnectionStatus(AppState.sseConnected ? 'connected' : 'disconnected');
      if (status === 'CLOSED' || status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
        setTimeout(subscribeRealtime, 3000);
      }
    });

  AppState.channel = channel;
  AppState.sseConnected = false;
  updateConnectionStatus('connecting');
}

function updateConnectionStatus(state) {
  if (state === 'connected') {
    connDot.className = 'cat-eye-dot connected';
    connText.textContent = '实时连接中 🟢';
  } else if (state === 'connecting') {
    connDot.className = 'cat-eye-dot';
    connText.textContent = '正在连接...';
  } else {
    connDot.className = 'cat-eye-dot disconnected';
    connText.textContent = '连接断开，重连中... 🔴';
  }
}

// ============================================================
// Toast 消息
// ============================================================
let toastTimer;
function showToast(msg, isError = false) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = 'toast ' + (isError ? 'error' : '');
  // 触发回流
  toast.offsetHeight;
  toast.classList.add('show');

  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

// ============================================================
// 小鱼干掉落特效
// ============================================================
function spawnFishParticles(card) {
  const rect = card.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  const fishes = ['🐟', '🐠', '🐡', '🐱', '🐾'];

  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const fish = document.createElement('span');
      fish.className = 'fish-particle';
      fish.textContent = fishes[Math.floor(Math.random() * fishes.length)];
      fish.style.left = (centerX + (Math.random() - 0.5) * 200) + 'px';
      fish.style.top = (centerY + Math.random() * 20) + 'px';
      fish.style.animationDuration = (1 + Math.random() * 1.5) + 's';
      fish.style.fontSize = (1 + Math.random() * 1.5) + 'em';
      document.body.appendChild(fish);

      setTimeout(() => fish.remove(), 2000);
    }, i * 80);
  }
}

// ============================================================
// 页面加载完成
// ============================================================
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
